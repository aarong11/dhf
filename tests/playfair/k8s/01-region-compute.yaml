# ═══════════════════════════════════════════════════════════════════════
#  REGION-COMPUTE — Cheap Compute Profile
# ═══════════════════════════════════════════════════════════════════════
#
#  Simulates a region with abundant compute but constrained storage and
#  moderate bandwidth. Think: AWS g5/p4d GPU spot instances.
#
#  Profile:
#    Medulla (PoW):     HIGH resources — fast CPU (fast mining, more epochs)
#    Hippocampus (DAG): LOW resources  — small memory (limited storage)
#    Cortex (EVM):      HIGH resources — fast contract execution
#    Agent budgets:     Compute=1000, Storage=200, Bandwidth=400
#
# ═══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: region-compute
  labels:
    ecca.io/region: compute
    ecca.io/profile: cheap-compute
  annotations:
    ecca.io/description: "Cheap compute region — fast PoW mining, throttled storage"
    ecca.io/compute-cost: "low"
    ecca.io/storage-cost: "high"
    ecca.io/bandwidth-cost: "medium"

---
# ─── Medulla PoW (generous CPU → fast mining → more epochs produced) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medulla-pow
  namespace: region-compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medulla-pow
  template:
    metadata:
      labels:
        app: medulla-pow
        ecca.io/region: compute
    spec:
      nodeSelector:
        ecca.io/region: region-compute
      tolerations:
        - operator: Exists
      containers:
        - name: medulla
          image: ecca-medulla-pow:local
          imagePullPolicy: Never
          env:
            - name: ECCA_DIFFICULTY
              value: "3"     # Lower difficulty → faster mining → compute is cheap
          ports:
            - containerPort: 8332
          resources:
            requests: { cpu: 1000m, memory: 512Mi }   # Generous CPU
            limits:   { cpu: 2000m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health, port: 8332 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: medulla-pow
  namespace: region-compute
spec:
  selector: { app: medulla-pow }
  ports:
    - port: 8332
      targetPort: 8332

---
# ─── Hippocampus DAG (throttled → storage is expensive here) ─────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hippocampus-dag
  namespace: region-compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hippocampus-dag
  template:
    metadata:
      labels:
        app: hippocampus-dag
        ecca.io/region: compute
    spec:
      nodeSelector:
        ecca.io/region: region-compute
      tolerations:
        - operator: Exists
      containers:
        - name: hippocampus
          image: ecca-hippocampus-dag:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          resources:
            requests: { cpu: 100m, memory: 128Mi }    # Throttled — storage is expensive
            limits:   { cpu: 250m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 5001 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: hippocampus-dag
  namespace: region-compute
spec:
  selector: { app: hippocampus-dag }
  ports:
    - port: 5001
      targetPort: 5001

---
# ─── Cortex EVM (generous — compute is cheap) ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-evm
  namespace: region-compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-evm
  template:
    metadata:
      labels:
        app: cortex-evm
        ecca.io/region: compute
    spec:
      nodeSelector:
        ecca.io/region: region-compute
      tolerations:
        - operator: Exists
      containers:
        - name: cortex
          image: ecca-cortex-evm:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8545
            - containerPort: 8546
          resources:
            requests: { cpu: 1000m, memory: 1Gi }    # Generous
            limits:   { cpu: 2000m, memory: 2Gi }
          readinessProbe:
            tcpSocket: { port: 8545 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-evm
  namespace: region-compute
spec:
  selector: { app: cortex-evm }
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
    - name: ws
      port: 8546
      targetPort: 8546
