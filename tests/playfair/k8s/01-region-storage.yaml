# ═══════════════════════════════════════════════════════════════════════
#  REGION-STORAGE — Cheap Storage Profile
# ═══════════════════════════════════════════════════════════════════════
#
#  Simulates a region with abundant, cheap storage but constrained compute
#  and moderate bandwidth. Think: Backblaze B2 or Hetzner storage boxes.
#
#  Profile:
#    Hippocampus (DAG): HIGH resources — large memory, fast disk
#    Medulla (PoW):     LOW resources  — throttled CPU (slow mining)
#    Cortex (EVM):      MEDIUM resources
#    Agent budgets:     Storage=1000, Compute=200, Bandwidth=400
#
# ═══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: region-storage
  labels:
    ecca.io/region: storage
    ecca.io/profile: cheap-storage
  annotations:
    ecca.io/description: "Cheap storage region — abundant hippocampus, throttled compute"
    ecca.io/compute-cost: "high"
    ecca.io/storage-cost: "low"
    ecca.io/bandwidth-cost: "medium"

---
# ─── Medulla PoW (throttled CPU → slow mining → fewer epochs produced) ─
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medulla-pow
  namespace: region-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medulla-pow
  template:
    metadata:
      labels:
        app: medulla-pow
        ecca.io/region: storage
    spec:
      nodeSelector:
        ecca.io/region: region-storage
      tolerations:
        - operator: Exists
      containers:
        - name: medulla
          image: ecca-medulla-pow:local
          imagePullPolicy: Never
          env:
            - name: ECCA_DIFFICULTY
              value: "6"     # Higher difficulty → slower mining → scarce compute
          ports:
            - containerPort: 8332
          resources:
            requests: { cpu: 200m, memory: 128Mi }    # Throttled CPU
            limits:   { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8332 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: medulla-pow
  namespace: region-storage
spec:
  selector: { app: medulla-pow }
  ports:
    - port: 8332
      targetPort: 8332

---
# ─── Hippocampus DAG (generous resources → abundant storage) ──────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hippocampus-dag
  namespace: region-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hippocampus-dag
  template:
    metadata:
      labels:
        app: hippocampus-dag
        ecca.io/region: storage
    spec:
      nodeSelector:
        ecca.io/region: region-storage
      tolerations:
        - operator: Exists
      containers:
        - name: hippocampus
          image: ecca-hippocampus-dag:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          resources:
            requests: { cpu: 500m, memory: 1Gi }     # Generous — storage is cheap here
            limits:   { cpu: 1000m, memory: 2Gi }
          readinessProbe:
            httpGet: { path: /health, port: 5001 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: hippocampus-dag
  namespace: region-storage
spec:
  selector: { app: hippocampus-dag }
  ports:
    - port: 5001
      targetPort: 5001

---
# ─── Cortex EVM (medium resources) ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-evm
  namespace: region-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-evm
  template:
    metadata:
      labels:
        app: cortex-evm
        ecca.io/region: storage
    spec:
      nodeSelector:
        ecca.io/region: region-storage
      tolerations:
        - operator: Exists
      containers:
        - name: cortex
          image: ecca-cortex-evm:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8545
            - containerPort: 8546
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          readinessProbe:
            tcpSocket: { port: 8545 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-evm
  namespace: region-storage
spec:
  selector: { app: cortex-evm }
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
    - name: ws
      port: 8546
      targetPort: 8546
