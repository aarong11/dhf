# ═══════════════════════════════════════════════════════════════════════
#  REGION-BANDWIDTH — Cheap Bandwidth Profile
# ═══════════════════════════════════════════════════════════════════════
#
#  Simulates a region with abundant bandwidth but constrained compute
#  and storage. Think: Cloudflare Workers, edge PoPs, CDN nodes.
#
#  Profile:
#    Cortex (EVM):      HIGH resources — fast tx routing
#    Medulla (PoW):     LOW resources  — slow mining
#    Hippocampus (DAG): LOW resources  — limited storage
#    Agent budgets:     Bandwidth=1000, Compute=200, Storage=200
#
# ═══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: region-bandwidth
  labels:
    ecca.io/region: bandwidth
    ecca.io/profile: cheap-bandwidth
  annotations:
    ecca.io/description: "Cheap bandwidth region — fast routing, throttled compute and storage"
    ecca.io/compute-cost: "high"
    ecca.io/storage-cost: "high"
    ecca.io/bandwidth-cost: "low"

---
# ─── Medulla PoW (throttled CPU) ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medulla-pow
  namespace: region-bandwidth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medulla-pow
  template:
    metadata:
      labels:
        app: medulla-pow
        ecca.io/region: bandwidth
    spec:
      nodeSelector:
        ecca.io/region: region-bandwidth
      tolerations:
        - operator: Exists
      containers:
        - name: medulla
          image: ecca-medulla-pow:local
          imagePullPolicy: Never
          env:
            - name: ECCA_DIFFICULTY
              value: "6"     # High difficulty → slow mining → scarce compute
          ports:
            - containerPort: 8332
          resources:
            requests: { cpu: 200m, memory: 128Mi }    # Throttled
            limits:   { cpu: 400m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8332 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: medulla-pow
  namespace: region-bandwidth
spec:
  selector: { app: medulla-pow }
  ports:
    - port: 8332
      targetPort: 8332

---
# ─── Hippocampus DAG (throttled) ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hippocampus-dag
  namespace: region-bandwidth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hippocampus-dag
  template:
    metadata:
      labels:
        app: hippocampus-dag
        ecca.io/region: bandwidth
    spec:
      nodeSelector:
        ecca.io/region: region-bandwidth
      tolerations:
        - operator: Exists
      containers:
        - name: hippocampus
          image: ecca-hippocampus-dag:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          resources:
            requests: { cpu: 100m, memory: 128Mi }    # Throttled
            limits:   { cpu: 250m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 5001 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: hippocampus-dag
  namespace: region-bandwidth
spec:
  selector: { app: hippocampus-dag }
  ports:
    - port: 5001
      targetPort: 5001

---
# ─── Cortex EVM (generous — bandwidth/routing is cheap) ──────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-evm
  namespace: region-bandwidth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-evm
  template:
    metadata:
      labels:
        app: cortex-evm
        ecca.io/region: bandwidth
    spec:
      nodeSelector:
        ecca.io/region: region-bandwidth
      tolerations:
        - operator: Exists
      containers:
        - name: cortex
          image: ecca-cortex-evm:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8545
            - containerPort: 8546
          resources:
            requests: { cpu: 1000m, memory: 1Gi }    # Generous
            limits:   { cpu: 2000m, memory: 2Gi }
          readinessProbe:
            tcpSocket: { port: 8545 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-evm
  namespace: region-bandwidth
spec:
  selector: { app: cortex-evm }
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
    - name: ws
      port: 8546
      targetPort: 8546
