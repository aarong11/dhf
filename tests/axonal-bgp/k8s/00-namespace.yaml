# ═══════════════════════════════════════════════════════════════════════
#  BGP Simulation Namespace + Shared Infra
#  Uses ecca-shared for Postgres/Redis/NATS (applied separately)
#  Creates bgp-sim namespace for the 4 AS agents + orchestrator
# ═══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: bgp-sim
  labels:
    ecca.io/role: bgp-sim

---
# ─── Cortex EVM (shared dev chain for contracts) ─────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-evm
  namespace: bgp-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-evm
  template:
    metadata:
      labels:
        app: cortex-evm
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: geth
          image: ethereum/client-go:v1.14.8
          args:
            - --dev
            - --http
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=eth,net,web3,personal,debug
            - --http.corsdomain=*
            - --http.vhosts=*
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.api=eth,net,web3
            - --ws.origins=*
            - --allow-insecure-unlock
            - --dev.period=1
          ports:
            - containerPort: 8545
              name: rpc
            - containerPort: 8546
              name: ws
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          readinessProbe:
            tcpSocket:
              port: 8545
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-evm
  namespace: bgp-sim
spec:
  selector:
    app: cortex-evm
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
    - name: ws
      port: 8546
      targetPort: 8546
