# ═══════════════════════════════════════════════════════════════════════
#  BGP Agent Deployments — 4 Autonomous Systems (AS-100 through AS-400)
#  Each runs agent-bgp-router.js as a lightweight HTTP service.
# ═══════════════════════════════════════════════════════════════════════

# ═══════════════════ AS-100 (Transit Provider) ═══════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-bgp-100
  namespace: bgp-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-bgp-100
  template:
    metadata:
      labels:
        app: agent-bgp-100
        ecca.io/as: "100"
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: ecca-bgp-agent:local
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
          env:
            - name: AS_NUMBER
              value: "100"
            - name: PORT
              value: "9090"
            - name: SIYANA_API
              value: "http://siyana-api.ecca-shared:7070"
            - name: PEERS
              value: "http://agent-bgp-200.bgp-sim:9090,http://agent-bgp-300.bgp-sim:9090,http://agent-bgp-400.bgp-sim:9090"
            - name: CORTEX_RPC
              value: "http://cortex-evm.bgp-sim:8545"
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 128Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 9090 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-bgp-100
  namespace: bgp-sim
spec:
  selector: { app: agent-bgp-100 }
  ports:
    - port: 9090
      targetPort: 9090

---
