name: Axonal-BGP Routing Security Test

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Number of simulation epochs"
        required: false
        default: "50"
  schedule:
    # Nightly at 04:00 UTC (offset from playfair)
    - cron: "0 4 * * *"
  push:
    branches: [main]
    paths:
      - "tests/axonal-bgp/**"
      - "contracts/src/ResidueToRoutingSwap.sol"
      - "contracts/src/RouteOracle.sol"
      - "contracts/scripts/deploy.ts"
      - ".github/workflows/axonal-bgp.yml"

permissions:
  contents: write

concurrency:
  group: axonal-bgp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  axonal-bgp:
    name: Run Axonal-BGP routing simulation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: "!contains(github.event.head_commit.message, '[skip bgp]')"

    env:
      EPOCHS: ${{ github.event.inputs.epochs || '50' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: bgp-buildx-${{ runner.os }}-${{ hashFiles('Dockerfile.builder', 'pnpm-lock.yaml') }}
          restore-keys: |
            bgp-buildx-${{ runner.os }}-

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "9.7.0"
          run_install: false

      - name: Show toolchain
        run: |
          docker version --format '{{.Server.Version}}'
          k3d version
          terraform version | head -1
          node --version

      # ─── Build images ───────────────────────────────────────────────
      - name: Build ts-builder image
        run: |
          docker build -f Dockerfile.builder --target ts-builder -t ecca-ts-builder:local .

      - name: Build BGP agent + orchestrator images
        run: |
          docker build -f tests/axonal-bgp/Dockerfile.agent \
            -t ecca-bgp-agent:local tests/axonal-bgp/
          docker build -f tests/axonal-bgp/Dockerfile.orchestrator \
            -t ecca-bgp-orchestrator:local tests/axonal-bgp/

      # ─── Terraform ──────────────────────────────────────────────────
      - name: Terraform init
        working-directory: tests/axonal-bgp/terraform
        run: terraform init -no-color

      - name: Terraform apply
        working-directory: tests/axonal-bgp/terraform
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          BGP_RUNNER: github-actions/${{ runner.os }}
        run: |
          terraform apply -auto-approve -no-color \
            -var "skip_images=true" \
            -var "epochs=${EPOCHS}"

      - name: Collect cluster diagnostics on failure
        if: failure()
        run: |
          echo "=== Pods (all namespaces) ==="
          kubectl get pods -A -o wide || true
          echo ""
          echo "=== Events ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
          for ns in bgp-sim; do
            echo ""
            echo "=== Logs in ${ns} ==="
            for pod in $(kubectl -n "$ns" get pods -o name 2>/dev/null); do
              echo "--- ${ns}/${pod} ---"
              kubectl -n "$ns" describe "$pod" | tail -20 || true
              kubectl -n "$ns" logs "$pod" --tail=50 --all-containers=true 2>/dev/null || true
            done
          done

      # ─── Publish ────────────────────────────────────────────────────
      - name: Copy report into docs/
        if: always()
        run: |
          mkdir -p docs
          if [ -s tests/axonal-bgp/axonal-bgp-report.html ]; then
            cp tests/axonal-bgp/axonal-bgp-report.html docs/axonal-bgp-report.html
          fi

      - name: Upload report + results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axonal-bgp-report-${{ github.run_number }}
          path: |
            tests/axonal-bgp/axonal-bgp-report.html
            tests/axonal-bgp/results/axonal-bgp-results.json
            tests/axonal-bgp/results/orchestrator.log
          if-no-files-found: warn
          retention-days: 30

      - name: Commit report to docs/ (main only)
        if: github.ref == 'refs/heads/main' && success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/axonal-bgp-report.html || true
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "ci(axonal-bgp): update report from run #${{ github.run_number }} [skip ci]"
            git push
          fi

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Axonal-BGP Run ${{ github.run_number }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Epochs | ${EPOCHS} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Runner | ${{ runner.os }} |"
            echo ""
            if [ -s tests/axonal-bgp/results/axonal-bgp-results.json ]; then
              echo "### Summary"
              echo ""
              jq -r '
                "- Scenarios: \(.scenarios | length)\n" +
                "- Total residues: \([.residueSummary | to_entries[].value] | add // 0)\n" +
                "- Residue kinds: \(.residueSummary | keys | join(\", \"))\n" +
                "- Duration: \((.durationMs // 0) / 1000 | floor)s"
              ' tests/axonal-bgp/results/axonal-bgp-results.json || echo "(could not summarise)"
            fi
            echo ""
            echo "📊 [Full report](https://quellcrist-falconer.github.io/ECCA/axonal-bgp-report.html)"
            echo "📄 [Research paper](https://quellcrist-falconer.github.io/ECCA/axonal-bgp.pdf)"
          } >> "$GITHUB_STEP_SUMMARY"
