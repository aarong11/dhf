<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ECCA Stack — Cognitive Sync Dashboard</title>
<style>
  :root { --bg:#06080c; --fg:#cfe6ff; --accent:#7df9ff; --warn:#ff7d7d; --dim:#5a6f88; --panel:#0d121a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family: ui-monospace, "JetBrains Mono", Consolas, monospace; }
  header { padding: 14px 22px; border-bottom: 1px solid #11202c; display:flex; align-items:center; gap:18px; }
  header h1 { font-size: 16px; letter-spacing:.18em; margin:0; color: var(--accent); }
  header .tag { color: var(--dim); font-size: 11px; }
  main { display:grid; grid-template-columns: 1.2fr 1fr 1fr; gap:14px; padding:14px; }
  .panel { background: var(--panel); border:1px solid #11202c; border-radius:8px; padding:12px; min-height:200px; }
  .panel h2 { font-size:11px; letter-spacing:.22em; color:var(--accent); margin:0 0 10px 0; }
  .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  button, input, select { background:#0a121b; color:var(--fg); border:1px solid #1d2c3c; border-radius:4px; padding:6px 10px; font-family:inherit; font-size:12px; }
  button { cursor:pointer; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; line-height:1.5; max-height: 280px; overflow:auto; background:#070b11; padding:8px; border-radius:4px; }
  .stack, .sleeve { border:1px solid #1d2c3c; border-radius:6px; padding:8px; margin-bottom:8px; font-size:12px; }
  .stack b, .sleeve b { color: var(--accent); }
  .badge { display:inline-block; padding:1px 6px; border:1px solid #1d2c3c; border-radius:10px; font-size:10px; color:var(--dim); margin-right:4px; }
  .badge.warn { color: var(--warn); border-color: #4a1f1f; }
  .log { font-size: 11px; line-height: 1.45; }
  .log .ev { color: var(--accent); }
  .log .ts { color: var(--dim); }
  footer { padding: 8px 22px; color:var(--dim); font-size:11px; border-top:1px solid #11202c; }
</style>
</head>
<body>
<header>
  <h1>◉ ECCA STACK</h1>
  <span class="tag">DHF-Compatible Cognitive Sync Engine</span>
  <span id="status" class="tag">connecting…</span>
</header>

<main>
  <section class="panel">
    <h2>STACKS</h2>
    <div class="row">
      <input id="stackName" placeholder="name" />
      <select id="stackKind"><option value="human">human</option><option value="ai">ai</option></select>
      <button onclick="createStack()">+ Stack</button>
      <button onclick="refresh()">↻</button>
    </div>
    <div id="stacks"></div>
  </section>

  <section class="panel">
    <h2>SLEEVES (EMBODIMENTS)</h2>
    <div class="row">
      <select id="targetStack"></select>
      <select id="embType">
        <option value="human">human</option>
        <option value="ai">ai</option>
        <option value="mining">mining</option>
        <option value="memory">memory</option>
      </select>
      <button onclick="spawnSleeve()">+ Sleeve</button>
    </div>
    <div class="row">
      <select id="srcSleeve"></select>
      <select id="dstSleeve"></select>
      <button onclick="needlecast()">⇶ Needlecast</button>
    </div>
    <div class="row">
      <input id="perceive" placeholder="input thought…" style="flex:1" />
      <button onclick="perceive()">▶ Perceive</button>
    </div>
    <div id="sleeves"></div>
  </section>

  <section class="panel">
    <h2>MINING / EPOCH / DAG</h2>
    <div class="row">
      <button onclick="mine()">⛏ Mine Block</button>
      <button onclick="tick()">⟳ Coord. Tick</button>
    </div>
    <pre id="mining"></pre>
    <h2 style="margin-top:14px">REAL-TIME EVENTS</h2>
    <pre id="log" class="log"></pre>
  </section>
</main>

<footer>research-grade simulation · identity is reconstructed, not stored</footer>

<script>
const $ = (id) => document.getElementById(id);
const fmt = (o) => JSON.stringify(o, null, 2);

async function api(path, opts) {
  const r = await fetch(path, { headers: { 'content-type': 'application/json' }, ...opts });
  return r.json();
}

async function refresh() {
  const stacks = await api('/stacks');
  const sleeves = await api('/sleeves');
  $('stacks').innerHTML = stacks.map(s => `
    <div class="stack">
      <b>${s.name}</b> <span class="badge">${s.kind}</span>
      <span class="badge">epoch ${s.epoch}</span>
      <span class="badge">mem ${s.memory.chainLength}</span>
      <span class="badge">sleeves ${s.sleeves.length}</span>
      <span class="badge">anchors ${s.anchors}</span>
      <div style="color:#5a6f88;font-size:10px;margin-top:4px">${s.id}</div>
      <div class="row" style="margin-top:6px">
        <input data-stack="${s.id}" placeholder="memory…" style="flex:1" />
        <button onclick="remember('${s.id}', this)">+ Memory</button>
        <button onclick="recall('${s.id}')">recall</button>
      </div>
    </div>`).join('') || '<i style="color:#5a6f88">no stacks</i>';

  $('sleeves').innerHTML = sleeves.map(s => `
    <div class="sleeve">
      <b>${s.embodiment_type}</b> <span class="badge ${s.drift>10?'warn':''}">drift ${s.drift}</span>
      <span class="badge">epoch ${s.epoch}</span>
      <span class="badge">comp ${s.tokens.compute.toFixed(1)}</span>
      <div style="color:#5a6f88;font-size:10px">${s.id}</div>
      <div style="font-size:10px;margin-top:4px">${(s.thoughts||[]).slice(-1)[0] || '—'}</div>
      <div class="row" style="margin-top:4px">
        <button onclick="syncSleeve('${s.id}')">sync</button>
        <button onclick="killSleeve('${s.id}')">decommission</button>
      </div>
    </div>`).join('') || '<i style="color:#5a6f88">no sleeves</i>';

  $('targetStack').innerHTML = stacks.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  $('srcSleeve').innerHTML = sleeves.map(s => `<option value="${s.id}">${s.embodiment_type}@${s.id.slice(-6)}</option>`).join('');
  $('dstSleeve').innerHTML = $('srcSleeve').innerHTML;
}

async function createStack() {
  await api('/stacks', { method: 'POST', body: JSON.stringify({ name: $('stackName').value || 'unnamed', kind: $('stackKind').value }) });
  refresh();
}
async function spawnSleeve() {
  await api('/sleeves/spawn', { method: 'POST', body: JSON.stringify({ stackId: $('targetStack').value, embodiment_type: $('embType').value }) });
  refresh();
}
async function needlecast() {
  const from = $('srcSleeve').value, to = $('dstSleeve').value;
  if (!from || !to) return;
  // any stack id works for the route — server resolves from sleeve
  const stackId = $('targetStack').value || 'auto';
  const r = await api(`/stacks/${stackId}/needlecast`, { method: 'POST', body: JSON.stringify({ from, to }) });
  log('needlecast', r);
  refresh();
}
async function syncSleeve(id) { log('sync', await api('/sleeves/sync', { method:'POST', body: JSON.stringify({ id }) })); refresh(); }
async function killSleeve(id) { await api('/sleeves/' + id, { method:'DELETE' }); refresh(); }
async function perceive() {
  const id = $('srcSleeve').value;
  if (!id) return;
  log('perceive', await api('/sleeves/perceive', { method:'POST', body: JSON.stringify({ id, input: $('perceive').value }) }));
  refresh();
}
async function remember(stackId, btn) {
  const input = btn.parentElement.querySelector('input');
  await api(`/stacks/${stackId}/remember`, { method:'POST', body: JSON.stringify({ text: input.value, pin: false }) });
  input.value = '';
  refresh();
}
async function recall(id) { log('recall', await api(`/stacks/${id}/recall?depth=8`)); }
async function mine() { const b = await api('/mining/block', { method:'POST', body:'{}' }); $('mining').textContent = fmt(b); refresh(); }
async function tick() { $('mining').textContent = fmt(await api('/coordination/tick')); }

function log(ev, payload) {
  const t = new Date().toLocaleTimeString();
  $('log').textContent = `[${t}] ${ev}\n${fmt(payload)}\n\n` + $('log').textContent;
  if ($('log').textContent.length > 6000) $('log').textContent = $('log').textContent.slice(0, 6000);
}

const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onopen = () => { $('status').textContent = '● online'; refresh(); };
ws.onclose = () => { $('status').textContent = '○ disconnected'; };
ws.onmessage = (m) => {
  try { const { event, payload } = JSON.parse(m.data); log(event, payload); }
  catch {}
};
</script>
</body>
</html>
